<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOESS explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #666;
    --radius: 6px;
    --font: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .tracker-name {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.2;
  }

  .headline-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  .share-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    cursor: pointer;
    color: var(--muted);
    white-space: nowrap;
    transition: color 0.15s;
  }
  .share-btn:hover { color: var(--text); }
  .share-btn svg { width: 14px; height: 14px; }

  .controls-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--muted);
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-group label { font-weight: 500; color: var(--text); }

  input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 4px;
    background: #ddd;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  .ctrl-val {
    font-family: var(--font-mono);
    font-size: 12px;
    min-width: 36px;
    color: var(--text);
    font-weight: 500;
  }

  .ctrl-divider { width: 1px; height: 20px; background: var(--border); }

  .toggle-label {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .legend-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: opacity 0.15s;
    user-select: none;
  }
  .legend-pill.hidden-party { opacity: 0.3; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    position: relative;
  }

  #chart-canvas { width: 100% !important; display: block; }

  .status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 0.75rem;
    font-family: var(--font-mono);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 4px;
    vertical-align: middle;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    background: var(--text);
    color: #fff;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: var(--radius);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    body { padding: 1rem; }
    .controls-bar { gap: 1rem; }
    input[type=range] { width: 80px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div>
    <div class="tracker-name" id="tracker-name">Loading…</div>
    <h1 id="headline">LOESS track 'n trial</h1>
    <div class="headline-sub" id="intro-line"></div>
  </div>
  <button class="share-btn" id="share-btn" title="Copy shareable link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="3" r="1.5"/><circle cx="4" cy="8" r="1.5"/><circle cx="12" cy="13" r="1.5"/>
      <line x1="5.4" y1="7.1" x2="10.6" y2="4"/><line x1="5.4" y1="8.9" x2="10.6" y2="12"/>
    </svg>
    Share view
  </button>
</header>

<div class="controls-bar">
  <div class="ctrl-group">
    <label for="bw-slider">Bandwidth</label>
    <input type="range" id="bw-slider" min="30" max="400" step="10" value="120">
    <span class="ctrl-val"><span id="bw-val">120</span>d</span>
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <label for="mp-slider">Min polls</label>
    <input type="range" id="mp-slider" min="2" max="10" step="1" value="4">
    <span class="ctrl-val" id="mp-val">4</span>
  </div>
  <div class="ctrl-divider"></div>
  <label class="toggle-label ctrl-group">
    <input type="checkbox" id="show-dots" checked>
    <span>Show poll dots</span>
  </label>
  <label class="toggle-label ctrl-group">
    <input type="checkbox" id="show-sparse" checked>
    <span>Show sparse zones</span>
  </label>
</div>

<div class="legend" id="legend"></div>

<div class="chart-wrap">
  <div style="position:relative; height: 440px;">
    <canvas id="chart-canvas" role="img" aria-label="Welsh voting intention tracker, LOESS smoothed poll data"></canvas>
  </div>
</div>

<div class="status">
  <span><span class="status-dot"></span><span id="status-text">Loading data…</span></span>
  <span id="status-polls"></span>
  <span id="status-params"></span>
</div>

<div class="toast" id="toast">Link copied to clipboard</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CONFIG_URL = "config.json";

let config = null;
let allPolls = [];
let hiddenParties = new Set();
let chart = null;

// ---------------------------------------------------------------------------
// URL state (shareable)
// ---------------------------------------------------------------------------

function readUrlParams() {
  const p = new URLSearchParams(location.search);
  return {
    bw:        p.has("bw")     ? +p.get("bw")     : null,
    minPolls:  p.has("mp")     ? +p.get("mp")     : null,
    showDots:  p.has("dots")   ? p.get("dots") !== "0" : null,
    hidden:    p.has("hidden") ? p.get("hidden").split(",").filter(Boolean) : []
  };
}

function writeUrlParams() {
  const p = new URLSearchParams();
  p.set("bw", document.getElementById("bw-slider").value);
  p.set("mp", document.getElementById("mp-slider").value);
  p.set("dots", document.getElementById("show-dots").checked ? "1" : "0");
  if (hiddenParties.size) p.set("hidden", [...hiddenParties].join(","));
  history.replaceState(null, "", "?" + p.toString());
}

// ---------------------------------------------------------------------------
// Config + data loading
// ---------------------------------------------------------------------------

async function loadConfig() {
  const resp = await fetch(CONFIG_URL);
  return resp.json();
}

function parseDate(s) {
  const [d, m, y] = s.trim().split("/");
  return new Date(+y, +m - 1, +d);
}

function shouldSkip(pollster, patterns) {
  return patterns.some(pat => pollster.toLowerCase().includes(pat.toLowerCase()));
}

async function fetchPolls(cfg) {
  const resp = await fetch(cfg.dataUrl);
  const text = await resp.text();
  const lines = text.trim().split("\n");

  // Find header row
  let headerIdx = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].toLowerCase().startsWith("date")) { headerIdx = i; break; }
  }

  const dataLines = lines.slice(headerIdx + 1);
  const skipPatterns = cfg.skipPollsterPatterns || [];
  const polls = [];

  for (const line of dataLines) {
    const cols = line.split(",");
    if (!cols[0] || !cols[0].trim()) continue;
    let date;
    try { date = parseDate(cols[0]); } catch { continue; }
    if (isNaN(date)) continue;

    const pollster = (cols[1] || "").trim();
    if (shouldSkip(pollster, skipPatterns)) continue;

    const entry = { date, ts: date.getTime(), pollster, values: {} };
    for (const party of cfg.parties) {
      const raw = (cols[party.col] || "").trim();
      entry.values[party.name] = raw !== "" && raw !== "0" ? +raw : null;
    }
    polls.push(entry);
  }

  polls.sort((a, b) => a.ts - b.ts);
  return polls;
}

// ---------------------------------------------------------------------------
// Kernel LOESS
// ---------------------------------------------------------------------------

function tricube(u) {
  const a = Math.abs(u);
  if (a >= 1) return 0;
  return Math.pow(1 - Math.pow(a, 3), 3);
}

function kernelLoess(pts, bandwidthMs, minPolls, nSteps = 300) {
  if (pts.length < 2) return [];
  const tMin = pts[0][0], tMax = pts[pts.length - 1][0];
  const bw = bandwidthMs;
  const results = [];

  for (let i = 0; i <= nSteps; i++) {
    const t = tMin + (tMax - tMin) * (i / nSteps);
    const nearby = pts.filter(([tx]) => Math.abs(tx - t) <= bw);
    if (nearby.length < minPolls) { results.push({ t, y: null, sparse: false }); continue; }

    const wider = pts.filter(([tx]) => Math.abs(tx - t) <= bw * 1.8);
    const sparse = wider.length < minPolls * 2;

    let wSum = 0, wySum = 0;
    for (const [tx, y] of nearby) {
      const w = tricube((tx - t) / bw);
      wSum += w; wySum += w * y;
    }
    results.push({ t, y: wSum > 0 ? Math.round(wySum / wSum * 10) / 10 : null, sparse });
  }
  return results;
}

// ---------------------------------------------------------------------------
// Legend
// ---------------------------------------------------------------------------

function buildLegend(cfg) {
  const el = document.getElementById("legend");
  el.innerHTML = "";
  for (const party of cfg.parties) {
    if (!party.includeInLine) continue;
    const pill = document.createElement("div");
    pill.className = "legend-pill" + (hiddenParties.has(party.name) ? " hidden-party" : "");
    pill.style.borderColor = party.color + "55";
    pill.style.background = party.color + "12";
    pill.innerHTML = `<span class="legend-dot" style="background:${party.color}"></span>${party.name}`;
    pill.addEventListener("click", () => {
      if (hiddenParties.has(party.name)) hiddenParties.delete(party.name);
      else hiddenParties.add(party.name);
      pill.classList.toggle("hidden-party");
      writeUrlParams();
      rebuildChart();
    });
    el.appendChild(pill);
  }
}

// ---------------------------------------------------------------------------
// Chart
// ---------------------------------------------------------------------------

function getParams() {
  return {
    bw:        +document.getElementById("bw-slider").value * 86400000,
    minPolls:  +document.getElementById("mp-slider").value,
    showDots:  document.getElementById("show-dots").checked,
    showSparse: document.getElementById("show-sparse").checked,
  };
}

function buildDatasets(cfg, polls, params) {
  const { bw, minPolls, showDots, showSparse } = params;
  const datasets = [];

  for (const party of cfg.parties) {
    if (!party.includeInLine) continue;
    const hidden = hiddenParties.has(party.name);

    const pts = polls
      .filter(p => p.values[party.name] !== null && p.values[party.name] !== undefined)
      .map(p => [p.ts, p.values[party.name]]);

    if (pts.length === 0) continue;

    const smooth = kernelLoess(pts, bw, minPolls);

    // Line dataset
    datasets.push({
      label: party.name,
      data: smooth.map(s => ({ x: s.t, y: s.y })),
      borderColor: party.color,
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.4,
      fill: false,
      spanGaps: false,
      hidden,
      partyName: party.name,
      smoothData: smooth,
      segment: {
        borderDash: ctx => {
          const s = smooth[ctx.p0DataIndex];
          return s && s.sparse && showSparse ? [5, 4] : [];
        },
        borderColor: ctx => {
          const s = smooth[ctx.p0DataIndex];
          return s && s.sparse && showSparse ? party.color + "77" : party.color;
        }
      }
    });

    // Dot dataset
    if (showDots) {
      datasets.push({
        label: party.name + "_dots",
        data: pts.map(([x, y]) => ({ x, y })),
        borderColor: party.color,
        backgroundColor: party.color + "30",
        borderWidth: 1.5,
        pointRadius: 3.5,
        pointHoverRadius: 5,
        showLine: false,
        hidden,
        partyName: party.name,
      });
    }
  }
  return datasets;
}

function updateStatus(polls, params) {
  const bwDays = params.bw / 86400000;
  document.getElementById("status-polls").textContent = `${polls.length} polls`;
  document.getElementById("status-params").textContent = `bandwidth ${bwDays}d · min polls ${params.minPolls}`;

  if (polls.length > 0) {
    const latest = polls[polls.length - 1];
    document.getElementById("status-text").textContent =
      `Latest: ${latest.pollster}, ${latest.date.toLocaleDateString("en-GB", {day:"numeric",month:"short",year:"numeric"})}`;
  }
}

function rebuildChart() {
  if (!config || !allPolls.length) return;
  const params = getParams();
  const datasets = buildDatasets(config, allPolls, params);
  updateStatus(allPolls, params);
  writeUrlParams();

  if (chart) {
    chart.data.datasets = datasets;
    chart.update("none");
    return;
  }

  const ctx = document.getElementById("chart-canvas").getContext("2d");
  chart = new Chart(ctx, {
    type: "line",
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => {
              const d = new Date(items[0].parsed.x);
              return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
            },
            label: item => {
              if (item.dataset.label.endsWith("_dots")) return null;
              if (item.parsed.y === null) return null;
              return ` ${item.dataset.partyName}: ${item.parsed.y.toFixed(1)}%`;
            }
          },
          filter: item => !item.dataset.label.endsWith("_dots") && item.parsed.y !== null
        }
      },
      scales: {
        x: {
          type: "linear",
          min: new Date(2010, 0, 1).getTime(),
          max: new Date(2027, 0, 1).getTime(),
          ticks: {
            callback: v => new Date(v).getFullYear(),
            maxTicksLimit: 18,
            color: "#999",
            font: { size: 11, family: "'DM Mono', monospace" }
          },
          grid: { color: "rgba(0,0,0,0.05)" }
        },
        y: {
          min: 0, max: 60,
          ticks: {
            callback: v => v + "%",
            color: "#999",
            font: { size: 11, family: "'DM Mono', monospace" }
          },
          grid: { color: "rgba(0,0,0,0.05)" }
        }
      }
    }
  });
}

// ---------------------------------------------------------------------------
// Share button
// ---------------------------------------------------------------------------

document.getElementById("share-btn").addEventListener("click", () => {
  writeUrlParams();
  navigator.clipboard.writeText(location.href).then(() => {
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  });
});

// ---------------------------------------------------------------------------
// Controls
// ---------------------------------------------------------------------------

document.getElementById("bw-slider").addEventListener("input", function() {
  document.getElementById("bw-val").textContent = this.value;
  rebuildChart();
});
document.getElementById("mp-slider").addEventListener("input", function() {
  document.getElementById("mp-val").textContent = this.value;
  rebuildChart();
});
document.getElementById("show-dots").addEventListener("change", rebuildChart);
document.getElementById("show-sparse").addEventListener("change", rebuildChart);

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------

async function boot() {
  try {
    config = await loadConfig();

    document.getElementById("tracker-name").textContent = config.trackerName;
    document.title = config.trackerName + " — explorer";

    // Apply URL params
    const urlParams = readUrlParams();
    if (urlParams.bw !== null) {
      document.getElementById("bw-slider").value = urlParams.bw;
      document.getElementById("bw-val").textContent = urlParams.bw;
    } else {
      document.getElementById("bw-slider").value = config.smoothing.bandwidthDays;
      document.getElementById("bw-val").textContent = config.smoothing.bandwidthDays;
    }
    if (urlParams.minPolls !== null) {
      document.getElementById("mp-slider").value = urlParams.minPolls;
      document.getElementById("mp-val").textContent = urlParams.minPolls;
    } else {
      document.getElementById("mp-slider").value = config.smoothing.minPollsInWindow;
      document.getElementById("mp-val").textContent = config.smoothing.minPollsInWindow;
    }
    if (urlParams.showDots !== null) document.getElementById("show-dots").checked = urlParams.showDots;
    hiddenParties = new Set(urlParams.hidden);

    allPolls = await fetchPolls(config);

    buildLegend(config);
    rebuildChart();

    // Set headline from latest poll
    if (allPolls.length) {
      const latest = allPolls[allPolls.length - 1];
      const partyVals = config.parties
        .filter(p => p.includeInLine && latest.values[p.name] != null)
        .sort((a, b) => latest.values[b.name] - latest.values[a.name]);

      if (partyVals.length) {
        const leader = partyVals[0];
        document.getElementById("headline").textContent =
          `${leader.name} lead in ${config.trackerName}`;
        document.getElementById("intro-line").textContent =
          `Latest: ${latest.pollster} · ` +
          partyVals.map(p => `${p.name} ${latest.values[p.name]}%`).join(" · ");
      }
    }

  } catch (err) {
    console.error(err);
    document.getElementById("status-text").textContent = "Error loading data — check console";
  }
}

boot();
</script>
</body>
</html>
