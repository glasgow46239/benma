<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll tracker explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --border: rgba(0,0,0,0.1);
    --text: #1a1a1a; --muted: #666; --radius: 6px;
    --font: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
  header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
  .tracker-name { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; line-height: 1.2; }
  .headline-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }
  .share-btn { display: flex; align-items: center; gap: 6px; font-size: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; color: var(--muted); white-space: nowrap; transition: color 0.15s; }
  .share-btn:hover { color: var(--text); }
  .controls-bar { display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 13px; color: var(--muted); }
  .ctrl-group { display: flex; align-items: center; gap: 8px; }
  .ctrl-group label { font-weight: 500; color: var(--text); }
  input[type=range] { -webkit-appearance: none; width: 110px; height: 4px; background: #ddd; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text); cursor: pointer; }
  .ctrl-val { font-family: var(--font-mono); font-size: 12px; min-width: 36px; color: var(--text); font-weight: 500; }
  .ctrl-divider { width: 1px; height: 20px; background: var(--border); }
  select { font-family: var(--font); font-size: 13px; padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .legend-pill { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; border: 1.5px solid transparent; cursor: pointer; transition: opacity 0.15s; user-select: none; }
  .legend-pill.hidden-party { opacity: 0.3; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; position: relative; }
  .status { font-size: 12px; color: var(--muted); margin-top: 0.75rem; font-family: var(--font-mono); display: flex; gap: 1rem; flex-wrap: wrap; }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #22c55e; margin-right: 4px; vertical-align: middle; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; font-size: 13px; padding: 8px 16px; border-radius: var(--radius); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) { body { padding: 1rem; } .controls-bar { gap: 1rem; } input[type=range] { width: 80px; } }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div>
    <div class="tracker-name" id="tracker-name">Loading…</div>
    <h1 id="headline">Poll tracker explorer</h1>
    <div class="headline-sub" id="intro-line"></div>
  </div>
  <button class="share-btn" id="share-btn">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="3" r="1.5"/><circle cx="4" cy="8" r="1.5"/><circle cx="12" cy="13" r="1.5"/>
      <line x1="5.4" y1="7.1" x2="10.6" y2="4"/><line x1="5.4" y1="8.9" x2="10.6" y2="12"/>
    </svg>
    Share view
  </button>
</header>

<div class="controls-bar">
  <div class="ctrl-group" id="subgroup-ctrl" style="display:none">
    <label for="subgroup-select">Subgroup</label>
    <select id="subgroup-select"></select>
  </div>
  <div class="ctrl-divider" id="subgroup-divider" style="display:none"></div>
  <div class="ctrl-group">
    <label for="bw-slider">Bandwidth</label>
    <input type="range" id="bw-slider" min="30" max="400" step="10" value="120">
    <span class="ctrl-val"><span id="bw-val">120</span>d</span>
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <label for="mp-slider">Min polls</label>
    <input type="range" id="mp-slider" min="2" max="10" step="1" value="4">
    <span class="ctrl-val" id="mp-val">4</span>
  </div>
  <div class="ctrl-divider"></div>
  <label class="ctrl-group" style="cursor:pointer">
    <input type="checkbox" id="show-dots" checked>
    <span>Show poll dots</span>
  </label>
  <label class="ctrl-group" style="cursor:pointer">
    <input type="checkbox" id="show-sparse" checked>
    <span>Show sparse zones</span>
  </label>
</div>

<div class="legend" id="legend"></div>

<div class="chart-wrap">
  <div style="position:relative; height:440px;">
    <canvas id="chart-canvas"></canvas>
  </div>
</div>

<div class="status">
  <span><span class="status-dot"></span><span id="status-text">Loading data…</span></span>
  <span id="status-polls"></span>
  <span id="status-params"></span>
</div>

<div class="toast" id="toast">Link copied to clipboard</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CONFIG_URL = "config.json";
let config = null, allPolls = [], hiddenParties = new Set(), chart = null;
let activeSubgroup = null; // null = all polls (no subgroup config)

// ---------------------------------------------------------------------------
// URL state
// ---------------------------------------------------------------------------

function readUrlParams() {
  const p = new URLSearchParams(location.search);
  return {
    bw:       p.has("bw")  ? +p.get("bw")  : null,
    minPolls: p.has("mp")  ? +p.get("mp")  : null,
    showDots: p.has("dots") ? p.get("dots") !== "0" : null,
    hidden:   p.has("hidden") ? p.get("hidden").split(",").filter(Boolean) : [],
    subgroup: p.get("sg") || null
  };
}

function writeUrlParams() {
  const p = new URLSearchParams();
  p.set("bw",   document.getElementById("bw-slider").value);
  p.set("mp",   document.getElementById("mp-slider").value);
  p.set("dots", document.getElementById("show-dots").checked ? "1" : "0");
  if (hiddenParties.size) p.set("hidden", [...hiddenParties].join(","));
  if (activeSubgroup) p.set("sg", activeSubgroup);
  history.replaceState(null, "", "?" + p.toString());
}

// ---------------------------------------------------------------------------
// Data fetching
// ---------------------------------------------------------------------------

function parseDate(s) {
  const str = s.trim();
  // YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [y,m,d] = str.split("-");
    return new Date(+y, +m-1, +d);
  }
  // DD/MM/YYYY
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
    const [d,m,y] = str.split("/");
    return new Date(+y, +m-1, +d);
  }
  return new Date(str);
}

function shouldSkip(pollster, patterns) {
  return patterns.some(pat => pollster.toLowerCase().includes(pat.toLowerCase()));
}

async function fetchPolls(cfg) {
  const resp = await fetch(cfg.dataUrl);
  const text = await resp.text();
  const lines = text.trim().split("\n");
  let headerIdx = 0;
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].toLowerCase().startsWith("date")) { headerIdx = i; break; }
  }
  const skipPatterns = cfg.skipPollsterPatterns || [];
  const subgroupCol  = cfg.subgroupColumn != null ? cfg.subgroupColumn : null;
  const polls = [];
  for (const line of lines.slice(headerIdx + 1)) {
    const cols = line.split(",");
    if (!cols[0] || !cols[0].trim()) continue;
    const date = parseDate(cols[0]);
    if (isNaN(date)) continue;
    const pollster = (cols[1] || "").trim();
    if (shouldSkip(pollster, skipPatterns)) continue;
    const subgroup = subgroupCol != null ? (cols[subgroupCol] || "").trim().toLowerCase() : null;
    const entry = { date, ts: date.getTime(), pollster, subgroup, values: {} };
    for (const party of cfg.parties) {
      const raw = (cols[party.col] || "").trim();
      entry.values[party.name] = raw !== "" && raw !== "0" ? +raw : null;
    }
    polls.push(entry);
  }
  polls.sort((a, b) => a.ts - b.ts);
  return polls;
}

function getActivePollsAndBw() {
  let polls = allPolls;
  let bwDays = +document.getElementById("bw-slider").value;
  let minPolls = +document.getElementById("mp-slider").value;

  if (activeSubgroup && config.subgroups) {
    polls = allPolls.filter(p => p.subgroup === activeSubgroup);
    // Use subgroup-specific smoothing defaults if set
    const sg = config.subgroups.find(s => s.value === activeSubgroup);
    if (sg) {
      if (sg.bandwidthDays && document.getElementById("bw-slider").dataset.userSet !== "1")
        bwDays = sg.bandwidthDays;
      if (sg.minPollsInWindow && document.getElementById("mp-slider").dataset.userSet !== "1")
        minPolls = sg.minPollsInWindow;
    }
  }
  return { polls, bwDays, minPolls };
}

// ---------------------------------------------------------------------------
// Subgroup UI
// ---------------------------------------------------------------------------

function buildSubgroupDropdown() {
  const subgroups = config.subgroups;
  if (!subgroups || !subgroups.length) return;

  document.getElementById("subgroup-ctrl").style.display = "flex";
  document.getElementById("subgroup-divider").style.display = "block";

  const sel = document.getElementById("subgroup-select");
  sel.innerHTML = '<option value="">All polls</option>';
  for (const sg of subgroups) {
    const opt = document.createElement("option");
    opt.value = sg.value;
    opt.textContent = sg.name;
    sel.appendChild(opt);
  }

  if (activeSubgroup) sel.value = activeSubgroup;

  sel.addEventListener("change", () => {
    activeSubgroup = sel.value || null;
    // Reset sliders to subgroup defaults
    document.getElementById("bw-slider").dataset.userSet = "0";
    document.getElementById("mp-slider").dataset.userSet = "0";
    applySubgroupDefaults();
    writeUrlParams();
    rebuildChart();
  });
}

function applySubgroupDefaults() {
  const bwSlider = document.getElementById("bw-slider");
  const mpSlider = document.getElementById("mp-slider");

  if (activeSubgroup && config.subgroups) {
    const sg = config.subgroups.find(s => s.value === activeSubgroup);
    if (sg) {
      if (sg.bandwidthDays) {
        bwSlider.value = sg.bandwidthDays;
        document.getElementById("bw-val").textContent = sg.bandwidthDays;
      }
      if (sg.minPollsInWindow) {
        mpSlider.value = sg.minPollsInWindow;
        document.getElementById("mp-val").textContent = sg.minPollsInWindow;
      }
      return;
    }
  }
  // Fall back to global defaults
  bwSlider.value = config.smoothing.bandwidthDays;
  document.getElementById("bw-val").textContent = config.smoothing.bandwidthDays;
  mpSlider.value = config.smoothing.minPollsInWindow;
  document.getElementById("mp-val").textContent = config.smoothing.minPollsInWindow;
}

// ---------------------------------------------------------------------------
// LOESS
// ---------------------------------------------------------------------------

function tricube(u) { const a = Math.abs(u); if (a >= 1) return 0; return Math.pow(1 - Math.pow(a, 3), 3); }

function kernelLoess(pts, bwMs, minPolls, nSteps=300) {
  if (pts.length < 2) return [];
  const tMin = pts[0][0], tMax = pts[pts.length-1][0];
  const results = [];
  for (let i = 0; i <= nSteps; i++) {
    const t = tMin + (tMax - tMin) * (i / nSteps);
    const nearby = pts.filter(([tx]) => Math.abs(tx - t) <= bwMs);
    if (nearby.length < minPolls) { results.push({ t, y: null, sparse: false }); continue; }
    const wider = pts.filter(([tx]) => Math.abs(tx - t) <= bwMs * 1.8);
    const sparse = wider.length < minPolls * 2;
    let wSum = 0, wySum = 0;
    for (const [tx, y] of nearby) { const w = tricube((tx - t) / bwMs); wSum += w; wySum += w * y; }
    results.push({ t, y: wSum > 0 ? Math.round(wySum / wSum * 10) / 10 : null, sparse });
  }
  return results;
}

// ---------------------------------------------------------------------------
// Legend
// ---------------------------------------------------------------------------

function buildLegend() {
  const el = document.getElementById("legend");
  el.innerHTML = "";
  for (const party of config.parties) {
    if (!party.includeInLine) continue;
    const pill = document.createElement("div");
    pill.className = "legend-pill" + (hiddenParties.has(party.name) ? " hidden-party" : "");
    pill.style.borderColor = party.color + "55";
    pill.style.background  = party.color + "12";
    pill.innerHTML = `<span class="legend-dot" style="background:${party.color}"></span>${party.name}`;
    pill.addEventListener("click", () => {
      if (hiddenParties.has(party.name)) hiddenParties.delete(party.name);
      else hiddenParties.add(party.name);
      pill.classList.toggle("hidden-party");
      writeUrlParams();
      rebuildChart();
    });
    el.appendChild(pill);
  }
}

// ---------------------------------------------------------------------------
// Chart
// ---------------------------------------------------------------------------

function rebuildChart() {
  if (!config || !allPolls.length) return;

  const bwDays  = +document.getElementById("bw-slider").value;
  const minPolls = +document.getElementById("mp-slider").value;
  const showDots  = document.getElementById("show-dots").checked;
  const showSparse = document.getElementById("show-sparse").checked;
  const bwMs    = bwDays * 86400000;

  let polls = allPolls;
  if (activeSubgroup) polls = allPolls.filter(p => p.subgroup === activeSubgroup);

  writeUrlParams();

  const datasets = [];
  for (const party of config.parties) {
    if (!party.includeInLine) continue;
    const hidden = hiddenParties.has(party.name);
    const pts = polls
      .filter(p => p.values[party.name] != null)
      .map(p => [p.ts, p.values[party.name]]);
    if (!pts.length) continue;

    const smooth = kernelLoess(pts, bwMs, minPolls);
    datasets.push({
      label: party.name,
      data: smooth.map(s => ({ x: s.t, y: s.y })),
      borderColor: party.color, borderWidth: 2, pointRadius: 0,
      tension: 0.4, fill: false, spanGaps: false, hidden, partyName: party.name,
      segment: {
        borderDash:  ctx => { const s = smooth[ctx.p0DataIndex]; return s && s.sparse && showSparse ? [5,4] : []; },
        borderColor: ctx => { const s = smooth[ctx.p0DataIndex]; return s && s.sparse && showSparse ? party.color + "77" : party.color; }
      }
    });

    if (showDots) {
      datasets.push({
        label: party.name + "_dots",
        data: pts.map(([x,y]) => ({ x, y })),
        borderColor: party.color, backgroundColor: party.color + "30",
        borderWidth: 1.5, pointRadius: 3.5, pointHoverRadius: 5,
        showLine: false, hidden, partyName: party.name
      });
    }
  }

  // Status
  const latest = polls[polls.length - 1];
  const subgroupLabel = activeSubgroup
    ? (config.subgroups.find(s => s.value === activeSubgroup) || {}).name || activeSubgroup
    : "all polls";
  document.getElementById("status-polls").textContent = `${polls.length} polls · ${subgroupLabel}`;
  document.getElementById("status-params").textContent = `bandwidth ${bwDays}d · min polls ${minPolls}`;
  if (latest) {
    document.getElementById("status-text").textContent =
      `Latest: ${latest.pollster}, ${latest.date.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" })}`;
  }

  // Headline
  if (polls.length) {
    const partyVals = config.parties
      .filter(p => p.includeInLine && latest.values[p.name] != null)
      .sort((a,b) => latest.values[b.name] - latest.values[a.name]);
    if (partyVals.length) {
      const sg = activeSubgroup ? ` (${subgroupLabel})` : "";
      document.getElementById("headline").textContent =
        `${partyVals[0].name} lead${sg} in ${config.trackerName}`;
      document.getElementById("intro-line").textContent =
        `Latest: ${latest.pollster} · ` +
        partyVals.map(p => `${p.name} ${latest.values[p.name]}%`).join(" · ");
    }
  }

  if (chart) { chart.data.datasets = datasets; chart.update("none"); return; }

  const ctx = document.getElementById("chart-canvas").getContext("2d");
  chart = new Chart(ctx, {
    type: "line", data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => new Date(items[0].parsed.x).toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" }),
            label: item => item.dataset.label.endsWith("_dots") || item.parsed.y == null ? null
              : ` ${item.dataset.partyName}: ${item.parsed.y.toFixed(1)}%`
          },
          filter: item => !item.dataset.label.endsWith("_dots") && item.parsed.y !== null
        }
      },
      scales: {
        x: {
          type: "linear",
          ticks: { callback: v => new Date(v).getFullYear(), maxTicksLimit: 18, color: "#999", font: { size: 11 } },
          grid: { color: "rgba(0,0,0,0.05)" }
        },
        y: {
          min: 0, max: 60,
          ticks: { callback: v => v + "%", color: "#999", font: { size: 11 } },
          grid: { color: "rgba(0,0,0,0.05)" }
        }
      }
    }
  });
}

// ---------------------------------------------------------------------------
// Controls
// ---------------------------------------------------------------------------

document.getElementById("bw-slider").addEventListener("input", function() {
  this.dataset.userSet = "1";
  document.getElementById("bw-val").textContent = this.value;
  rebuildChart();
});
document.getElementById("mp-slider").addEventListener("input", function() {
  this.dataset.userSet = "1";
  document.getElementById("mp-val").textContent = this.value;
  rebuildChart();
});
document.getElementById("show-dots").addEventListener("change", rebuildChart);
document.getElementById("show-sparse").addEventListener("change", rebuildChart);

document.getElementById("share-btn").addEventListener("click", () => {
  writeUrlParams();
  navigator.clipboard.writeText(location.href).then(() => {
    const t = document.getElementById("toast");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  });
});

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------

async function boot() {
  try {
    config = await (await fetch(CONFIG_URL)).json();
    document.getElementById("tracker-name").textContent = config.trackerName;
    document.title = config.trackerName + " — explorer";

    const urlParams = readUrlParams();

    // Set smoothing defaults from config first
    document.getElementById("bw-slider").value = config.smoothing.bandwidthDays;
    document.getElementById("bw-val").textContent = config.smoothing.bandwidthDays;
    document.getElementById("mp-slider").value = config.smoothing.minPollsInWindow;
    document.getElementById("mp-val").textContent = config.smoothing.minPollsInWindow;

    // Build subgroup dropdown if needed
    if (config.subgroups && config.subgroups.length) {
      buildSubgroupDropdown();
      // Apply subgroup from URL if present
      if (urlParams.subgroup) {
        activeSubgroup = urlParams.subgroup;
        document.getElementById("subgroup-select").value = activeSubgroup;
      }
      applySubgroupDefaults();
    }

    // URL params override everything (user explicitly set these)
    if (urlParams.bw !== null) {
      document.getElementById("bw-slider").value = urlParams.bw;
      document.getElementById("bw-val").textContent = urlParams.bw;
      document.getElementById("bw-slider").dataset.userSet = "1";
    }
    if (urlParams.minPolls !== null) {
      document.getElementById("mp-slider").value = urlParams.minPolls;
      document.getElementById("mp-val").textContent = urlParams.minPolls;
      document.getElementById("mp-slider").dataset.userSet = "1";
    }
    if (urlParams.showDots !== null) document.getElementById("show-dots").checked = urlParams.showDots;
    hiddenParties = new Set(urlParams.hidden);

    allPolls = await fetchPolls(config);
    buildLegend();
    rebuildChart();

  } catch(err) {
    console.error(err);
    document.getElementById("status-text").textContent = "Error loading data — check console";
  }
}

boot();
</script>
</body>
</html>
