name: Nightly poll tracker update (all)

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  smooth-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests numpy

      - name: Run all poll trackers
        run: |
          for dir in trackers/*/; do
            config="${dir}config.json"
            if [ ! -f "$config" ]; then continue; fi
            if ! python3 -c "import json; json.load(open('$config'))" 2>/dev/null; then
              echo "Skipping $dir — invalid or empty config.json"
              continue
            fi
            pipeline=$(python3 -c "import json; print(json.load(open('$config')).get('pipeline','smooth'))")
            if [ "$pipeline" = "smooth" ]; then
              echo "Running smooth: $dir"
              python pipeline/smooth.py --config "$config" --push-to-datawrapper
            fi
          done
        env:
          DATAWRAPPER_TOKEN: ${{ secrets.DATAWRAPPER_TOKEN }}

      - name: Run approval trackers
        run: |
          for dir in trackers/*/; do
            config="${dir}config.json"
            if [ ! -f "$config" ]; then continue; fi
            pipeline=$(python3 -c "import json; print(json.load(open('$config')).get('pipeline','smooth'))")
            if [ "$pipeline" = "approval" ]; then
              echo "Running approval: $dir"
              python pipeline/approval.py --config "$config" --push-to-datawrapper
            fi
          done
        env:
          DATAWRAPPER_TOKEN: ${{ secrets.DATAWRAPPER_TOKEN }}

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trackers/
          git diff --cached --quiet || git commit -m "chore: update poll tracker data [$(date -u +%Y-%m-%d)]"
          git push
